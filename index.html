<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine AI Dashboard</title>
    <!-- นำเข้า Tailwind CSS สำหรับการตกแต่ง UI ระดับโมเดิร์น -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- นำเข้า Google Fontsเพื่อความสวยงามของตัวอักษร -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Sarabun', sans-serif;
        }
        /* ตกแต่งและควบคุมสไตล์ของ Canvas กล้องเว็บแคมที่งอกมาจาก JavaScript ให้สวยงาม */
        #webcam-container canvas {
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }
    </style>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4 sm:p-6 text-slate-100">

    <!-- การ์ด Dashboard หลัก -->
    <div class="max-w-4xl w-full bg-slate-900/50 backdrop-blur-md rounded-2xl shadow-2xl overflow-hidden border border-slate-800 grid grid-cols-1 md:grid-cols-2">
        
        <!-- ฝั่งซ้าย: กล้องเว็บแคมและปุ่มควบคุม -->
        <div class="p-6 sm:p-8 bg-slate-900 flex flex-col justify-between items-center text-center border-b md:border-b-0 md:border-r border-slate-800 min-h-[400px]">
            <div>
                <h1 class="text-2xl font-bold tracking-tight mb-2 text-indigo-400">Teachable Machine AI</h1>
                <p class="text-xs text-slate-400 mb-6 tracking-wide uppercase">Image Classification Real-time</p>
            </div>

            <!-- หน้าจอแสดงผลเว็บแคม -->
            <div class="relative w-full flex justify-center items-center my-4">
                <div id="webcam-container" class="w-[220px] h-[220px] bg-slate-950 rounded-2xl flex items-center justify-center border-2 border-dashed border-slate-800 overflow-hidden relative">
                    <!-- ข้อความแสดงระหว่างรอกดเปิดกล้อง -->
                    <div id="webcam-placeholder" class="text-slate-500 text-xs p-4 z-10 absolute text-center">
                        <svg class="mx-auto h-12 w-12 mb-3 text-slate-700 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                        คลิกปุ่มด้านล่างเพื่อเริ่มใช้งานกล้อง
                    </div>
                </div>
            </div>

            <!-- ปุ่มเริ่มต้นระบบ -->
            <button type="button" onclick="init()" id="btn-start" class="w-full max-w-xs bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 px-6 rounded-xl transition duration-200 ease-in-out transform hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-indigo-600/20 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
                </svg>
                เริ่มต้นระบบตรวจจับ
            </button>
        </div>

        <!-- ฝั่งขวา: ผลการวิเคราะห์และความแม่นยำ -->
        <div class="p-6 sm:p-8 flex flex-col justify-between bg-slate-900/20">
            <div>
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-lg font-bold text-slate-200 tracking-wide">ผลการวิเคราะห์</h2>
                    <span id="status-badge" class="bg-slate-800 text-slate-400 text-[10px] font-bold px-2.5 py-1 rounded-full uppercase tracking-widest border border-slate-700">Standby</span>
                </div>
                
                <!-- พื้นที่สำหรับใส่ Progress Bar ของแต่ละคลาส (จะถูกสร้างอัตโนมัติด้วย JavaScript) -->
                <div id="label-container" class="space-y-4">
                    <div class="text-slate-500 text-sm italic text-center py-12">
                        กดปุ่ม "เริ่มต้นระบบตรวจจับ" เพื่อแสดงผลลัพธ์
                    </div>
                </div>
            </div>

            <!-- หมายเหตุแถบด้านล่าง -->
            <div class="text-[11px] text-slate-500 border-t border-slate-800/60 pt-4 mt-6 text-center md:text-left flex items-center justify-center md:justify-start gap-1.5">
                <span class="w-2 h-2 rounded-full bg-indigo-500 inline-block"></span>
                <span>ขับเคลื่อนด้วย TensorFlow.js และ Teachable Machine Model</span>
            </div>
        </div>

    </div>

    <!-- สคริปต์ดั้งเดิมจากโมเดลของคุณ -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        // ลิงก์โมเดล Teachable Machine ของคุณ
        const URL = "https://teachablemachine.withgoogle.com/models/K45h-E9e2/";[cite: 4]

        let model, webcam, labelContainer, maxPredictions;

        // ฟังก์ชันโหลดโมเดลและตั้งค่ากล้องเว็บแคม
        async function init() {
            const btnStart = document.getElementById("btn-start");
            const statusBadge = document.getElementById("status-badge");
            
            // เปลี่ยนสถานะปุ่มขณะรอโหลดระบบ
            btnStart.disabled = true;
            btnStart.innerHTML = `<svg class="animate-spin h-4 w-4 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> กำลังโหลดโมเดล...`;

            const modelURL = URL + "model.json";[cite: 4]
            const metadataURL = URL + "metadata.json";[cite: 4]

            // โดลดตัว Model และ Metadata
            model = await tmImage.load(modelURL, metadataURL);[cite: 4]
            maxPredictions = model.getTotalClasses();[cite: 4]

            // ตั้งค่าและเรียกเปิดกล้องเว็บแคม
            const flip = true;[cite: 4]
            webcam = new tmImage.Webcam(220, 220, flip); // ปรับขนาดให้พอดีกับ UI[cite: 4]
            await webcam.setup(); // ขอสิทธิ์เข้าถึงกล้อง[cite: 4]
            await webcam.play();[cite: 4]
            window.requestAnimationFrame(loop);[cite: 4]

            // จัดการลบ Placeholder และนำ Canvas กล้องไปใส่ใน container 
            document.getElementById("webcam-placeholder").style.display = "none";
            document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 4]
            
            // เตรียมพื้นที่ฝั่งขวาสำหรับใส่ Progress Bar ตามจำนวนคลาส[cite: 4]
            labelContainer = document.getElementById("label-container");[cite: 4]
            labelContainer.innerHTML = ""; // ล้างข้อความ Standby ออกก่อน
            
            for (let i = 0; i < maxPredictions; i++) {[cite: 4]
                const classCard = document.createElement("div");
                classCard.className = "space-y-1.5 bg-slate-950/40 p-3 rounded-xl border border-slate-800/40";
                classCard.innerHTML = `
                    <div class="flex justify-between text-xs font-semibold text-slate-300">
                        <span class="class-name">Loading...</span>
                        <span class="class-percentage text-indigo-400">0%</span>
                    </div>
                    <div class="w-full bg-slate-950 rounded-full h-2 overflow-hidden border border-slate-800">
                        <div class="class-progress bg-indigo-600 h-full rounded-full transition-all duration-300 ease-out" style="width: 0%"></div>
                    </div>
                `;
                labelContainer.appendChild(classCard);[cite: 4]
            }

            // เปลี่ยนสถานะ Dashboard เป็นพร้อมทำงาน
            statusBadge.innerHTML = "Live";
            statusBadge.className = "bg-emerald-500/10 text-emerald-400 text-[10px] font-bold px-2.5 py-1 rounded-full uppercase tracking-widest border border-emerald-500/20";
            btnStart.className = "hidden"; // ซ่อนปุ่มเริ่มระบบเมื่อกล้องทำงานแล้ว
        }

        async function loop() {
            webcam.update(); // อัปเดตเฟรมภาพจากกล้องเว็บแคม[cite: 4]
            await predict();[cite: 4]
            window.requestAnimationFrame(loop);[cite: 4]
        }

        // นำภาพจากเว็บแคมไปประมวลผลผ่านโมเดล[cite: 4]
        async function predict() {
            const prediction = await model.predict(webcam.canvas);[cite: 4]
            
            for (let i = 0; i < maxPredictions; i++) {[cite: 4]
                const className = prediction[i].className;[cite: 4]
                const probability = prediction[i].probability;[cite: 4]
                const percentage = (probability * 100).toFixed(0) + "%";
                
                // เข้าถึงกลุ่ม Element ของแต่ละคลาสเพื่ออัปเดตข้อมูล UI แบบเรียลไทม์
                const card = labelContainer.children[i];
                if (card) {
                    card.querySelector(".class-name").innerText = className;
                    card.querySelector(".class-percentage").innerText = percentage;
                    card.querySelector(".class-progress").style.width = percentage;
                    
                    // ลูกเล่นเพิ่มเติม: ถ้าค่าความแม่นยำ (Confidence) มากกว่า 70% จะเปลี่ยนแท็บความแรงให้เป็นสีเขียวมรกต
                    if (probability > 0.7) {
                        card.querySelector(".class-progress").className = "class-progress bg-emerald-500 h-full rounded-full transition-all duration-150 ease-out";
                        card.querySelector(".class-percentage").className = "class-percentage text-emerald-400 font-bold";
                    } else {
                        card.querySelector(".class-progress").className = "class-progress bg-indigo-600 h-full rounded-full transition-all duration-150 ease-out";
                        card.querySelector(".class-percentage").className = "class-percentage text-indigo-400";
                    }
                }
            }
        }
    </script>
</body>
</html>
