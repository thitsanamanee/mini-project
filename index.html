<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine AI Dashboard</title>
    <!-- นำเข้า Tailwind CSS สำหรับการตกแต่ง UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- นำเข้า Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* ปรับแต่ง Canvas ของกล้องเว็บแคมให้แสดงผลสวยงาม */
        #webcam-container canvas {
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100% !important;
            height: auto !important;
            max-width: 320px;
            transform: scaleX(-1); /* กลับด้านซ้ายขวาให้เหมือนส่องกระจก */
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 sm:p-6">

    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100 grid grid-cols-1 md:grid-cols-2">
        
        <!-- ส่วนที่ 1: หน้าจอควบคุมและแสดงผลกล้อง (ฝั่งซ้าย) -->
        <div class="p-6 sm:p-8 bg-slate-900 flex flex-col justify-between items-center text-center text-white min-h-[400px]">
            <div>
                <h1 class="text-2xl font-bold tracking-tight mb-2 text-indigo-400">Teachable Machine Model</h1>
                <p class="text-sm text-slate-400 mb-6">ระบบวิเคราะห์ภาพด้วย AI (อัปเดตผลทุก 3 วินาที)</p>
            </div>

            <!-- กล่องแสดงผลเว็บแคม -->
            <div class="relative w-full flex justify-center items-center my-4">
                <div id="webcam-container" class="w-[240px] h-[240px] bg-slate-800 rounded-2xl flex items-center justify-center border-2 border-dashed border-slate-700 overflow-hidden">
                    <div id="webcam-placeholder" class="text-slate-500 text-sm p-4">
                        <svg class="mx-auto h-12 w-12 mb-2 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                        กดปุ่มด้านล่างเพื่อเปิดใช้งานกล้อง
                    </div>
                </div>
            </div>

            <!-- ปุ่มเปิดใช้งาน -->
            <button type="button" onclick="init()" id="btn-start" class="w-full max-w-xs bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 px-6 rounded-xl transition duration-200 ease-in-out transform hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-indigo-600/30 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
                </svg>
                Start System
            </button>
        </div>

        <!-- ส่วนที่ 2: หน้าจอแสดงผลลัพธ์การทำนาย (ฝั่งขวา) -->
        <div class="p-6 sm:p-8 flex flex-col justify-between bg-white">
            <div>
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xl font-bold text-slate-800">ผลการวิเคราะห์</h2>
                    <span id="status-badge" class="bg-slate-100 text-slate-600 text-xs font-semibold px-2.5 py-1 rounded-full uppercase tracking-wider">Ready</span>
                </div>
                
                <!-- ส่วนแสดง Progress Bars ของแต่ละคลาสตามข้อมูลจากโมเดล -->
                <div id="label-container" class="space-y-4">
                    <div class="text-slate-400 text-sm italic text-center py-8">
                        รอการเชื่อมต่อระบบและวิเคราะห์ข้อมูล...
                    </div>
                </div>
            </div>

            <div class="text-xs text-slate-400 border-t border-slate-100 pt-4 mt-6 text-center md:text-left">
                ระบบจะวิเคราะห์ภาพจากเว็บแคมโดยอัตโนมัติในทุก ๆ 3 วินาที เพื่อประสิทธิภาพสูงสุด
            </div>
        </div>

    </div>

    <!-- สคริปต์การทำงานของ TensorFlow และ Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        // เรียกใช้ URL โมเดลตามไฟล์ต้นฉบับของคุณ
        const URL = "https://teachablemachine.withgoogle.com/models/K45h-E9e2/";[cite: 2]
        let model, webcam, labelContainer, maxPredictions;
        let predictInterval; // ตัวแปรสำหรับเรียกประมวลผลทุก 3 วินาที

        async function init() {
            const btnStart = document.getElementById("btn-start");
            const statusBadge = document.getElementById("status-badge");
            
            // แสดงสถานะระหว่างโหลดข้อมูล
            btnStart.disabled = true;
            btnStart.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> โหลดโมเดล...`;
            
            const modelURL = URL + "model.json";[cite: 2]
            const metadataURL = URL + "metadata.json";[cite: 2]

            try {
                // โหลดโมเดลและจัดการข้อมูลคลาส
                model = await tmImage.load(modelURL, metadataURL);[cite: 2]
                maxPredictions = model.getTotalClasses();[cite: 2]

                // ตั้งค่าเว็บแคม
                const flip = true; 
                webcam = new tmImage.Webcam(240, 240, flip); // ปรับขนาดให้เหมาะกับ UI
                await webcam.setup();[cite: 2]
                await webcam.play();[cite: 2]
                
                // สั่งรันลูปสำหรับการเรนเดอร์ภาพเคลื่อนไหวของกล้องเว็บแคม
                window.requestAnimationFrame(loop);[cite: 2]

                // ซ่อนข้อความ Placeholder และนำกล้องใส่เข้าไปแทน
                document.getElementById("webcam-placeholder").style.display = "none";
                const webcamBox = document.getElementById("webcam-container");
                webcamBox.innerHTML = "";
                webcamBox.appendChild(webcam.canvas);[cite: 2]

                // จัดการพื้นที่ผลลัพธ์การทำนาย
                labelContainer = document.getElementById("label-container");[cite: 2]
                labelContainer.innerHTML = ""; 
                
                for (let i = 0; i < maxPredictions; i++) {[cite: 2]
                    // สร้าง Element การ์ดผลลัพธ์พร้อมหลอดความมั่นใจ (Progress Bar)
                    const classCard = document.createElement("div");
                    classCard.className = "space-y-1";
                    classCard.innerHTML = `
                        <div class="flex justify-between text-sm font-medium text-slate-700">
                            <span class="class-name">กำลังตรวจสอบ...</span>
                            <span class="class-percentage text-indigo-600">0%</span>
                        </div>
                        <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
                            <div class="class-progress bg-indigo-600 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                        </div>
                    `;
                    labelContainer.appendChild(classCard);[cite: 2]
                }

                // ปรับเปลี่ยนหน้าตา UI เมื่อระบบทำงานสำเร็จ
                statusBadge.innerHTML = "Live (3s)";
                statusBadge.className = "bg-green-100 text-green-700 text-xs font-semibold px-2.5 py-1 rounded-full uppercase tracking-wider";
                btnStart.className = "hidden"; // ซ่อนปุ่มกดเมื่อเปิดระบบสำเร็จแล้ว

                // ⚡ หัวใจสำคัญ: เรียกทำนายผลครั้งแรก และใช้ setInterval ทำนายซ้ำทุก ๆ 3 วินาที (3000 ms)
                await predict();
                predictInterval = setInterval(predict, 3000);

            } catch (error) {
                console.error(error);
                alert("ไม่สามารถเข้าถึงกล้องเว็บแคม หรือการโหลดโมเดลผิดพลาด");
                btnStart.disabled = false;
                btnStart.innerText = "ลองใหม่อีกครั้ง";
            }
        }

        async function loop() {
            webcam.update(); // อัปเดตเฟรมภาพจากกล้องตามปกติเพื่อให้วิดีโอลื่นไหล[cite: 2]
            window.requestAnimationFrame(loop);[cite: 2]
        }

        // ฟังก์ชันวิเคราะห์ภาพ (Predict) ที่จะทำงานเฉพาะทุก ๆ 3 วินาทีตามตัวควบคุม
        async function predict() {
            if (!model || !webcam) return;
            
            const prediction = await model.predict(webcam.canvas);[cite: 2]
            
            for (let i = 0; i < maxPredictions; i++) {[cite: 2]
                const className = prediction[i].className;[cite: 2]
                const probability = prediction[i].probability;[cite: 2]
                const percentage = (probability * 100).toFixed(0) + "%";
                
                const card = labelContainer.childNodes[i];[cite: 2]
                if (card && card.querySelector) {
                    card.querySelector(".class-name").innerText = className;
                    card.querySelector(".class-percentage").innerText = percentage;
                    card.querySelector(".class-progress").style.width = percentage;
                    
                    // ปรับแต่งสีหลอดแบบ Dynamic: หากความเชื่อมั่นเกิน 60% จะเปลี่ยนเป็นสีเขียว ถ้าต่ำกว่าจะเป็นสีน้ำเงินปกติ
                    if (probability > 0.6) {
                        card.querySelector(".class-progress").className = "class-progress bg-emerald-500 h-2.5 rounded-full transition-all duration-500";
                        card.querySelector(".class-percentage").className = "class-percentage text-emerald-600 font-bold";
                    } else {
                        card.querySelector(".class-progress").className = "class-progress bg-indigo-600 h-2.5 rounded-full transition-all duration-500";
                        card.querySelector(".class-percentage").className = "class-percentage text-indigo-600";
                    }
                }
            }
        }
    </script>
</body>
</html>
